# Profile README workflow — copy to epo33m/epo33m → .github/workflows/metrics.yml
#
# Privacy: SVGs show only aggregate stats (commits, languages %, coding hours, badges).
# No repository names, no project titles, no "recent activity" feed.
#
# METRICS_TOKEN: classic PAT with read:user (+ public_repo if language chart is empty).

name: ✨ Metrics

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  metrics:
    name: Generate metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare output directory
        run: mkdir -p github

      - name: Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: epo33m
          base: ""
          filename: metrics.isocalendar.svg
          output_action: none
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: epo33m
          base: ""
          filename: metrics.languages.svg
          output_action: none
          plugin_languages: yes
          plugin_languages_indepth: no
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 6
          plugin_languages_ignored: html, css, json, yaml, markdown

      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: epo33m
          base: ""
          filename: metrics.habits.svg
          output_action: none
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 0

      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: epo33m
          base: ""
          filename: metrics.achievements.svg
          output_action: none
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0

      - name: Collect SVG files
        run: |
          shopt -s nullglob
          for f in /metrics_renders/*.svg ./metrics_renders/*.svg; do
            [ -f "$f" ] && cp -v "$f" github/
          done
          if [ ! "$(ls -A github/*.svg 2>/dev/null)" ]; then
            echo "::error::No SVG files were generated — check the metrics steps above"
            exit 1
          fi
          ls -la github/

      - name: Commit metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github/*.svg
          git diff --staged --quiet || git commit -m "Update metrics [skip ci]"
          git push
