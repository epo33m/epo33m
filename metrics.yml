# Profile README workflow — copy to epo33m/epo33m → .github/workflows/metrics.yml
#
# Privacy: SVGs show only aggregate stats (commits, languages %, coding hours, badges).
# No repository names, no project titles, no "recent activity" feed.
#
# METRICS_TOKEN: classic PAT with read:user only — do NOT add repo scope.
#   → Language stats use public repos only; private work stays out of charts.
#   → Commit calendar can still include private *counts* if you enable
#     "Include private contributions on my profile" in GitHub settings
#     (green squares only — never repo names).

name: ✨ Metrics

on:
  schedule:
    - cron: "0 2 * * *" # Runs daily at 02:00 UTC
  workflow_dispatch: # Can be triggered manually

jobs:
  metrics:
    name: Generate metrics
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # 📅 Commit calendar — activity only, no repo names
      # ─────────────────────────────────────────
      - name: Isometric calendar
        uses: lowlighter/metrics@latest
        with:
          filename: github/metrics.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: epo33m
          base: ""
          repositories: 0
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ─────────────────────────────────────────
      # 🈷️ Languages — aggregate % only (public repos)
      # ─────────────────────────────────────────
      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: github/metrics.languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: epo33m
          base: ""
          repositories: 0
          plugin_languages: yes
          plugin_languages_indepth: no
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 6
          plugin_languages_ignored: html, css, json, yaml, markdown

      # ─────────────────────────────────────────
      # 💡 Coding habits — when you code, not what you code on
      # ─────────────────────────────────────────
      - name: Habits
        uses: lowlighter/metrics@latest
        with:
          filename: github/metrics.habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: epo33m
          base: ""
          repositories: 0
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 0

      # ─────────────────────────────────────────
      # 🏆 Achievements — GitHub badges only
      # ─────────────────────────────────────────
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: github/metrics.achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: epo33m
          base: ""
          repositories: 0
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_limit: 0

      - name: Commit metrics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github/
          git diff --staged --quiet || git commit -m "Update metrics [skip ci]"
          git push
